{% extends 'welcomepage.html' %}
{% load static %}
{% block title %}List of properties{% endblock%}
{% block content %}
<div class="column is-full has-background-black">
    <button class="button is-warning js-modal-trigger " data-target="modal-js-filter">
        Customize your search
      </button>
   
</div>
<div id="modal-js-filter" class="modal">
    <div class="modal-background"></div>
  
    <div class="modal-content">
        
      <div class="box">
        <h4 class="title is-4">What type of place are you looking for?</h4>
        <form class="filter-container" method="GET" action="{% url 'properties-list' %}">
            <div class="field">
                <label class="label">Type</label>
                <div class="select is-primary">
                    <select name="type">
                      <option>SR</option>
                      <option>DR</option>
                      <option>1BHK</option>
                      <option>2BHK</option>
                      <option>3BHK</option>
                      <option>4BHK</option>
                    </select>
                  </div>
            </div>
            <div class="field">
                <label class="label">City</label>
                <div class="select is-primary">
                    <select name="city">
                      <option>Kathmandu</option>
                      <option>Pokhara</option>
                      <option>Butwal</option>
                      <option>Birtamode</option>
                      <option>Biratnagar</option>
                      <option>Dharan</option>
                    </select>
                  </div>
            </div>
            <div class="field">
                <label class="label">Address</label>
                <div class="control">
                  <input class="input is-success" type="text" name="address">
                </div>
              </div>
              <div class="field">
                <label class="label">Price range</label>
                <div class="control">
                    <input class="input is-success" type="number" name="min-price" min='0' >
                    To
                    <input class="input is-success" type="number" name="max-price" min='0' >
                </div>
              </div>
              <div class="field">
                <label class="label">Parking options</label>
                <div class="select is-primary">
                    <select name="parking">
                      <option>Any</option>
                      <option>Two wheeler</option>
                      <option>Four wheeler</option>
                    </select>
                  </div>
            </div>
            <button type="submit" class="button is-medium is-fullwidth has-background-black has-text-white ">Apply filter</button>
        </form>
      </div>
    </div>
  
    <button class="modal-close is-large" aria-label="close"></button>
  </div> 
{% endblock %}
